<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECHNOMATON Hub Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1419;--card:#1a2332;--card-hover:#222e3f;--border:#2a3a4e;
  --text:#e6edf3;--text-muted:#8b949e;--text-dim:#5a6470;
  --teal:#4ecdc4;--blue:#45b7d1;--gold:#f7dc6f;--purple:#bb8fce;--red:#e74c3c;
  --critical:#e74c3c;--warning:#f39c12;--info:#3498db;
  --community:#2ecc71;--commercial:#9b59b6;
  --sidebar-w:220px;
}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;overflow-x:hidden}

/* Sidebar */
.sidebar{position:fixed;left:0;top:0;width:var(--sidebar-w);height:100vh;
  background:#141b24;border-right:1px solid var(--border);z-index:100;
  display:flex;flex-direction:column;padding:20px 0}
.sidebar-logo{padding:0 20px 20px;font-size:14px;font-weight:700;
  letter-spacing:1px;color:var(--teal);border-bottom:1px solid var(--border)}
.sidebar-logo span{display:block;font-size:11px;color:var(--text-muted);font-weight:400;margin-top:2px}
.sidebar nav{flex:1;overflow-y:auto;padding:12px 0}
.sidebar nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;
  color:var(--text-muted);text-decoration:none;font-size:13px;
  border-left:3px solid transparent;transition:all .2s}
.sidebar nav a:hover,.sidebar nav a.active{color:var(--text);
  background:rgba(78,205,196,.06);border-left-color:var(--teal)}
.sidebar nav a .nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Main */
.main{margin-left:var(--sidebar-w);padding:30px 40px 60px}
section{margin-bottom:50px;scroll-margin-top:20px}
.section-title{font-size:20px;font-weight:600;margin-bottom:20px;
  padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.section-title .dot{width:8px;height:8px;border-radius:50%}

/* Stat Cards */
.stat-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:30px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:18px;text-align:center;transition:transform .2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-card .val{font-size:28px;font-weight:700}
.stat-card .lbl{font-size:12px;color:var(--text-muted);margin-top:4px}

/* Grid helpers */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:1100px){.grid-2{grid-template-columns:1fr}}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px}
.card-title{font-size:14px;font-weight:600;margin-bottom:12px}

/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-critical{background:rgba(231,76,60,.2);color:var(--critical)}
.badge-warning{background:rgba(243,156,18,.2);color:var(--warning)}
.badge-info{background:rgba(52,152,219,.2);color:var(--info)}
.badge-pack{background:rgba(78,205,196,.12);color:var(--teal);margin:2px 3px}
.badge-action{font-weight:700;padding:2px 10px;border-radius:4px;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.badge-merge{background:rgba(78,205,196,.2);color:var(--teal)}
.badge-rename{background:rgba(243,156,18,.2);color:var(--warning)}
.badge-grow{background:rgba(69,183,209,.2);color:var(--blue)}
.badge-p1{background:var(--critical);color:#fff}
.badge-p2{background:var(--warning);color:#111}
.badge-p3{background:var(--info);color:#fff}

/* Tooltip */
.tooltip{position:absolute;z-index:200;background:#222e3f;color:var(--text);
  border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-size:12px;
  white-space:pre-line;pointer-events:none;opacity:0;transition:opacity .15s;
  max-width:300px;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.tooltip.visible{opacity:1;pointer-events:auto}

/* Filter buttons */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--text-muted);cursor:pointer;font-size:12px;transition:all .2s}
.filter-btn:hover{border-color:var(--teal);color:var(--text)}
.filter-btn.active{background:var(--teal);color:#0f1419;border-color:var(--teal);font-weight:600}

/* Issue card */
.issue-card{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:16px 20px;margin-bottom:12px;transition:all .2s}
.issue-card:hover{border-color:var(--teal)}
.issue-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.issue-header .sev-icon{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.issue-title{font-weight:600;font-size:14px;flex:1}
.issue-packs{margin:6px 0}
.issue-detail{font-size:13px;color:var(--text-muted);margin-top:6px}
.issue-rec{font-size:12px;color:var(--teal);margin-top:6px;cursor:pointer;display:none}
.issue-card.expanded .issue-rec{display:block}
.expand-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:11px;margin-top:6px}

/* Recommendation cards */
.rec-card{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:16px 20px;margin-bottom:12px}
.rec-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.rec-text{font-size:13px;color:var(--text-muted)}

/* Legend */
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px;font-size:12px;color:var(--text-muted)}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-swatch{width:12px;height:12px;border-radius:3px}

/* Heatmap */
.heatmap-table{width:100%;border-collapse:separate;border-spacing:3px}
.heatmap-table th{font-size:11px;color:var(--text-muted);font-weight:500;padding:6px 4px;text-align:center}
.heatmap-table th:first-child{text-align:left;padding-left:10px;min-width:130px}
.heatmap-table td{text-align:center;padding:8px 4px;border-radius:4px;font-size:12px;
  font-weight:600;cursor:default;position:relative}
.heatmap-table td:first-child{text-align:left;padding-left:10px;font-weight:500;background:transparent!important;color:var(--text)}
.heatmap-cell{border-radius:4px;transition:transform .15s}
.heatmap-cell:hover{transform:scale(1.08);z-index:2}
.tier-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}

/* Overlap matrix */
.matrix-wrap{overflow-x:auto;padding-bottom:10px}
.matrix-table{border-collapse:separate;border-spacing:2px}
.matrix-table th{font-size:9px;color:var(--text-muted);font-weight:500;padding:4px;
  writing-mode:vertical-lr;text-orientation:mixed;transform:rotate(180deg);min-width:30px}
.matrix-table th.row-head{writing-mode:horizontal-tb;transform:none;text-align:right;padding-right:8px;min-width:100px}
.matrix-table td{width:30px;height:30px;border-radius:3px;cursor:default;position:relative;text-align:center;font-size:0}
.matrix-cell{transition:transform .15s}
.matrix-cell:hover{transform:scale(1.15);z-index:2}

/* Radar grid */
.radar-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:1100px){.radar-grid{grid-template-columns:repeat(2,1fr)}}
.radar-card{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:14px;display:flex;flex-direction:column;align-items:center}
.radar-card .pack-name{font-size:12px;font-weight:600;margin-bottom:6px}

/* Bar chart */
.bar-chart-container{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px}

/* Donut area */
.donut-area{display:flex;align-items:center;justify-content:center;flex-direction:column}

/* Scrollbar */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#3a4a5e}
</style>
</head>

// Build overlap matrix data
const OVERLAPS = {};
function addOverlap(a,b,severity,issueId){
  const key = [a,b].sort().join('|');
  if(!OVERLAPS[key] || severityRank(severity) > severityRank(OVERLAPS[key].severity)){
    OVERLAPS[key] = {severity, issueIds:[issueId]};
  } else {
    OVERLAPS[key].issueIds.push(issueId);
  }
}
function severityRank(s){return s==='critical'?3:s==='warning'?2:1}

  if(issue.packs.length === 2){
    addOverlap(issue.packs[0], issue.packs[1], issue.severity, issue.id);

});

}

// --- SECTION 3: Domain Treemap ---
(function(){
  const sec = document.createElement('section');
  sec.id = 'treemap';
  sec.innerHTML = '<div class="section-title"><span class="dot" style="background:#2ecc71"></span>Domain Treemap</div>';
  const card = document.createElement('div');
  card.className = 'card';

  const W = 900, H = 420;
  const svg = createSvg('100%', H, `0 0 ${W} ${H}`);
  svg.style.maxWidth = W+'px';

  // Compute domain totals
  const domainData = Object.entries(DOMAINS).map(([name,d])=>{
    const packData = d.packs.map(pid=>{
      const p = PACKS.find(x=>x.id===pid);
      return {id:pid, total: packTotal(p)};
    });
    return {name, color:d.color, total:packData.reduce((s,x)=>s+x.total,0), packs:packData};
  }).sort((a,b)=>b.total-a.total);

  const grandTotal = domainData.reduce((s,d)=>s+d.total,0);

  // Simple treemap: horizontal strips divided vertically
  let y = 0;
  const pad = 3;
  domainData.forEach(domain=>{
    const h = Math.max(40, (domain.total/grandTotal)*(H-pad*(domainData.length-1)));
    // Domain background
    const bg = svgEl('rect',{x:0,y,width:W,height:h,rx:6,fill:hexToRgba(domain.color,0.12),stroke:hexToRgba(domain.color,0.3),'stroke-width':1});
    svg.appendChild(bg);

    // Domain label
    const lbl = svgEl('text',{x:8,y:y+16,'font-size':11,'font-weight':600,fill:domain.color,'font-family':'inherit'});
    lbl.textContent = domain.name + ' (' + domain.total + ')';
    svg.appendChild(lbl);

    // Subdivide horizontally for packs
    let px = 0;
    const packArea = W;
    const labelH = 22;
    domain.packs.sort((a,b)=>b.total-a.total);
    const maxPackTotal = Math.max(1,...domain.packs.map(p=>p.total));
    domain.packs.forEach(pack=>{
      const pw = domain.total>0 ? Math.max(60, (pack.total/domain.total)*packArea) : packArea/domain.packs.length;
      const rect = svgEl('rect',{x:px+2,y:y+labelH,width:pw-4,height:h-labelH-4,rx:4,fill:hexToRgba(domain.color,0.2+0.15*(pack.total/maxPackTotal))});
      svg.appendChild(rect);

      const ptxt = svgEl('text',{x:px+pw/2,y:y+labelH+(h-labelH)/2+4,'text-anchor':'middle','font-size':10,fill:'#e6edf3','font-family':'inherit'});
      ptxt.textContent = pack.id.replace('tm-','') + ' (' + pack.total + ')';
      svg.appendChild(ptxt);
      px += pw;
    });

    y += h + pad;
  });

  card.appendChild(svg);
  sec.appendChild(card);
  mainEl.appendChild(sec);
})();

// =====================================================================
// UTILITY FUNCTIONS
// =====================================================================
function hexToRgba(hex, alpha){
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function positionTooltip(e, el){
  const x = e.clientX+12;
  const y = e.clientY+12;
  el.style.left = x+'px';
  el.style.top = y+'px';
  el.style.position = 'fixed';
}

function drawArc(svg, cx, cy, outerR, innerR, startDeg, endDeg, color){
  if(Math.abs(endDeg-startDeg)<0.5) return;
  const startRad = startDeg*Math.PI/180;
  const endRad = endDeg*Math.PI/180;
  const largeArc = (endDeg-startDeg)>180?1:0;

  const x1o = cx+outerR*Math.cos(startRad);
  const y1o = cy+outerR*Math.sin(startRad);
  const x2o = cx+outerR*Math.cos(endRad);
  const y2o = cy+outerR*Math.sin(endRad);
  const x1i = cx+innerR*Math.cos(endRad);
  const y1i = cy+innerR*Math.sin(endRad);
  const x2i = cx+innerR*Math.cos(startRad);
  const y2i = cy+innerR*Math.sin(startRad);

  const d = `M${x1o},${y1o} A${outerR},${outerR} 0 ${largeArc} 1 ${x2o},${y2o} L${x1i},${y1i} A${innerR},${innerR} 0 ${largeArc} 0 ${x2i},${y2i} Z`;
  const path = svgEl('path',{d,fill:color,opacity:0.85});
  svg.appendChild(path);
}

        const packs = card.querySelectorAll('.badge-pack');
        let match = false;
        packs.forEach(b=>{if(b.textContent.trim()===packName) match=true;});
        if(match){
          card.style.borderColor = 'var(--teal)';
          card.style.background = 'var(--card-hover)';
        } else {
          card.style.borderColor = 'var(--border)';
          card.style.background = 'var(--card)';
        }
      });
    });
  });
})();
</script>
</body>
</html>
