name: Export Agent Skills
on:
  push:
    tags: ['v*']
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Export Agent Skills
        run: bash scripts/export-agentskills.sh
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentskills
          path: dist/agentskills/
