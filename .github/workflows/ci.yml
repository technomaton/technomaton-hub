name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate pack structure
        run: bash scripts/validate.sh
      - name: Test export pipeline
        run: bash scripts/export-agentskills.sh --dry-run
